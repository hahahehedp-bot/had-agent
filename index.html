<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HAD-Agent</title>

  <link rel="manifest" id="manifestLink" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" id="metaThemeColor" content="#ffffff">
  <meta name="apple-mobile-web-app-title" id="metaAppTitle" content="HAD-Agent">

  <!-- Fonts (Pretendard Variable) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Core Styles (v15.3.0 Core Stabilization) -->
  <link rel="stylesheet" href="core/styles/themes.css?v=15.3.0">
  <link rel="stylesheet" href="core/styles/layout.css?v=15.3.0">
  <link rel="stylesheet" href="core/styles/components.css?v=15.3.0">
  <link rel="stylesheet" href="core/styles/responsive.css?v=15.3.0">

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- 글로벌 UI 오버레이 -->
  <div class="global-overlay" id="globalOverlay"></div>

  <!-- 에이전트 비서 드로어 (우) - [DRAWER Region] -->
  <aside class="agent-drawer" id="agentDrawer">
    <!-- 모듈에 의해 동적으로 채워지는 영역 -->
    <div class="agent-drawer-content" id="agentDrawerBody"></div>
  </aside>

  <div class="app-layout">
    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header" id="sidebarHeader"></div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-item" id="sidebarSettings">⚙️ 설정</div>
        <div class="sidebar-footer-item" id="sidebarInfo">ℹ️ 앱 정보</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <div class="app-viewport">
      <header class="app-header" id="appHeader">
        <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴">
          <span></span><span></span><span></span>
        </button>
        <div class="header-logo-wrap" id="headerLogoWrap"></div>

        <div class="header-right-actions">
          <!-- [v15.7.0] 레이아웃 컨트롤 버튼 (PC 전용 노출) -->
          <button class="header-tool-btn" id="btnToggleLeft" title="사이드바 토글">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <button class="header-tool-btn" id="btnToggleRight" title="에이전트 토글">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="15" y1="3" x2="15" y2="21"></line>
            </svg>
          </button>

          <button class="btn-profile" id="btnProfile" aria-label="프로필 메뉴">
            <div class="avatar-placeholder" id="headerAvatar">👤</div>
          </button>
        </div>
      </header>

      <main class="app-main" id="appMain">
        <!-- 초기 로딩 스크린 -->
        <div class="loading-screen" id="loadingScreen">
          <div class="loading-spinner"></div>
          <p id="loadingText">HAD-Agent 로딩 중...</p>
        </div>
      </main>

      <nav class="tab-bar" id="tabBar"></nav>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>설정</h3>
      <button class="btn-close" id="closeSettings">&times;</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <!-- 인증 레이어 -->
  <div id="authOverlay" style="display:none;"></div>

  <!-- 앱 진입점 (v15.3.0 정화 완료) -->
  <script type="module" src="core/app.js?v=15.3.0"></script>
</body>
</html>
