<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HAD-Agent</title>

  <link rel="manifest" id="manifestLink" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" id="metaThemeColor" content="#ffffff">
  <meta name="apple-mobile-web-app-title" id="metaAppTitle" content="HAD-Agent">

  <!-- Fonts (Pretendard Variable) -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- [v16.0.0] Dynamic Version Bootstrapper -->
  <script>
    (async () => {
      try {
        const res = await fetch('./version.json?t=' + Date.now());
        const { version } = await res.json();
        window.HAD_VERSION = version;

        const loadCSS = (href) => {
          const l = document.createElement('link');
          l.rel = 'stylesheet';
          l.href = href.startsWith('http') ? href : href + '?v=' + version;
          document.head.appendChild(l);
        };

        const loadJS = (src) => {
          const s = document.createElement('script');
          s.type = 'module';
          s.src = src.startsWith('http') ? src : src + '?v=' + version;
          document.body.appendChild(s);
        };

        // 0. 외부 라이브러리 (Swiper.js Core)
        loadCSS('https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css');
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js';
        document.head.appendChild(s);

        // 1. 스타일시트 동적 주입
        loadCSS('core/styles/themes.css');
        loadCSS('core/styles/layout.css');
        loadCSS('core/styles/components.css');
        loadCSS('core/styles/responsive.css');

        // 2. 코어 엔진 가동 (Swiper 로드 완료 후)
        s.onload = () => loadJS('core/app.js');

        console.log(`[HAD] Bootstrapping v${version} Completed.`);
      } catch (e) {
        console.error('[HAD] Bootstrapping Failed.', e);
      }
    })();
  </script>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <div id="app" class="swiper app-layout">
    <div class="swiper-wrapper">
      <!-- 사이드바 (좌 / 0번 패널) -->
      <aside id="sidebar" class="swiper-slide sidebar">
        <nav id="sidebarNav" class="sidebar-nav"></nav>
      </aside>

      <!-- 메인 뷰포트 (중앙 / 1번 패널) -->
      <main id="appViewport" class="swiper-slide app-viewport">
        <header class="app-header" id="appHeader">
          <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴">
            <span></span><span></span><span></span>
          </button>
          <div class="header-logo-wrap" id="headerLogoWrap"></div>

          <div class="header-right-actions">
            <button class="header-tool-btn" id="btnToggleLeft" title="사이드바 토글">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
              </svg>
            </button>
            <button class="header-tool-btn" id="btnToggleRight" title="에이전트 토글">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="15" y1="3" x2="15" y2="21"></line>
              </svg>
            </button>

            <div class="profile-wrap">
              <button class="btn-profile" id="btnProfile">
                <div class="avatar-placeholder" id="headerAvatar">👤</div>
              </button>
              <div class="profile-dropdown" id="profileDropdown">
                <div class="dropdown-section user-info">
                  <span class="user-name" id="dropUserName">유여름 리더님</span>
                  <span class="user-email" id="dropUserEmail">admin@owner.com</span>
                </div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" id="dropQuickSettings">Quick Settings <span class="item-key">⌘,</span></div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item" id="dropTheme">테마 전환 <span class="item-arrow">›</span></div>
                <div class="dropdown-item" id="dropUpdate">업데이트 확인...</div>
                <div class="dropdown-divider"></div>
                <div class="dropdown-item logout" id="dropLogout">로그아웃</div>
              </div>
            </div>
          </div>
        </header>

        <section class="app-main" id="appMain">
          <!-- 로딩 스크린 -->
          <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <p id="loadingText">HAD-Agent 로딩 중...</p>
          </div>
        </section>

        <!-- 상태 표시줄 -->
        <footer class="app-status-bar" id="appStatusBar">
          <div class="status-left">
            <span class="status-item">Ready</span>
          </div>
          <div class="status-right">
            <span id="statusVersion" class="status-item"></span>
          </div>
        </footer>

        <nav class="tab-bar" id="tabBar"></nav>
      </main>

      <!-- 에이전트 서랍 (우 / 2번 패널) -->
      <aside id="agentDrawer" class="swiper-slide agent-drawer">
        <div id="agentDrawerBody" class="agent-drawer-content"></div>
      </aside>
    </div>
  </div>

  <!-- 설정 패널 -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>설정</h3>
      <button class="btn-close" id="closeSettings">&times;</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

</body>
</html>
