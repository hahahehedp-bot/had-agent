<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>HAD-Agent</title>

  <!-- PWA & Theme (JS에서 동적으로 주입됨) -->
  <link rel="manifest" id="manifestLink" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" id="metaThemeColor" content="#ffffff">
  <meta name="apple-mobile-web-app-title" id="metaAppTitle" content="HAD-Agent">
  <!-- 아이콘 태그는 app.js에서 생성하여 head에 삽입합니다 -->

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Theme Stylesheet (JS에서 동적으로 교체됨) -->
  <link rel="stylesheet" id="themeStylesheet" href="">

  <!-- Core Styles -->
  <link rel="stylesheet" href="core/styles/layout.css">
  <link rel="stylesheet" href="core/styles/components.css">
  <link rel="stylesheet" href="core/styles/responsive.css">

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Google Identity Services (OAuth) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- 🔐 로그인 오버레이 -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <div id="loginLogoWrap" style="margin-bottom: 20px;"></div>
      <h2 style="margin-bottom: 10px; color: var(--text-primary); font-family: 'Outfit', sans-serif;">Welcome to HAD-Agent</h2>
      <p style="margin-bottom: 30px; font-size: 14px; color: var(--text-secondary);">서비스를 이용하려면 구글 계정으로 로그인하세요.</p>
      
      <!-- 구글 표준 로그인 버튼 컨테이너 -->
      <div id="g_id_onload"
           data-client_id="473448066886-7kjj7jhvliclqgdpa30et6t2m1shgbdt.apps.googleusercontent.com"
           data-context="signin"
           data-ux_mode="popup"
           data-callback="handleCredentialResponse"
           data-auto_prompt="false">
      </div>
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="outline"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left">
      </div>

      <!-- 테스트용 우회 버튼 (나중에 삭제) -->
      <button id="btnDevBypass" style="margin-top:20px; padding:10px 20px; border-radius:8px; border:1px solid #ddd; background:#f9f9f9; color:#666; font-size:12px; cursor:pointer;">
        [개발자 전용] 로그인 없이 앱 들어가기
      </button>
    </div>
  </div>

  <!-- 사이드바 오버레이 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <!-- 로고 및 브랜드명이 JS에 의해 주입됩니다 -->
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-item" id="sidebarSettings">⚙️ 설정</div>
        <div class="sidebar-footer-item" id="sidebarInfo">ℹ️ 앱 정보</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <div class="app-viewport">
      <header class="app-header" id="appHeader">
        <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴">
          <span></span><span></span><span></span>
        </button>
        <div class="header-logo-wrap" id="headerLogoWrap">
          <!-- 로고 및 텍스트 로고가 JS에 의해 주입됩니다 -->
        </div>
        <button class="btn-profile" id="btnProfile" aria-label="프로필 메뉴">
          <div class="avatar-placeholder" id="headerAvatar">👤</div>
        </button>
      </header>

      <main class="app-main" id="appMain">
        <div class="loading-screen" id="loadingScreen">
          <div class="loading-spinner"></div>
          <p>로딩 중...</p>
        </div>
      </main>

      <nav class="tab-bar" id="tabBar"></nav>
    </div>
  </div>

  <!-- 앱 설정 & 로직 -->
  <script type="module" src="core/app.js"></script>
</body>
</html>
