<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>HAD-Agent</title>

  <!-- PWA & Theme (JS에서 동적으로 주입됨) -->
  <link rel="manifest" id="manifestLink" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" id="metaThemeColor" content="#ffffff">
  <meta name="apple-mobile-web-app-title" id="metaAppTitle" content="HAD-Agent">
  <!-- 아이콘 태그는 app.js에서 생성하여 head에 삽입합니다 -->

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Theme Stylesheet (JS에서 동적으로 교체됨) -->
  <link rel="stylesheet" id="themeStylesheet" href="">

  <!-- Core Styles -->
  <link rel="stylesheet" href="core/styles/layout.css?v=8">
  <link rel="stylesheet" href="core/styles/components.css?v=8">
  <link rel="stylesheet" href="core/styles/responsive.css?v=8">

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- 사이드바 오버레이 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="app-layout">
    <!-- 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header" id="sidebarHeader">
        <!-- 로고 및 브랜드명이 JS에 의해 주입됩니다 -->
      </div>
      <nav class="sidebar-nav" id="sidebarNav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-footer-item" id="sidebarSettings">⚙️ 설정</div>
        <div class="sidebar-footer-item" id="sidebarInfo">ℹ️ 앱 정보</div>
      </div>
    </aside>

    <!-- 메인 영역 -->
    <div class="app-viewport">
      <header class="app-header" id="appHeader">
        <button class="btn-hamburger" id="btnHamburger" aria-label="메뉴">
          <span></span><span></span><span></span>
        </button>
        <div class="header-logo-wrap" id="headerLogoWrap">
          <!-- 로고 및 텍스트 로고가 JS에 의해 주입됩니다 -->
        </div>
        <button class="btn-profile" id="btnProfile" aria-label="프로필 메뉴">
          <div class="avatar-placeholder" id="headerAvatar">👤</div>
        </button>
      </header>

      <main class="app-main" id="appMain">
        <div class="loading-screen" id="loadingScreen">
          <div class="loading-spinner"></div>
          <p>로딩 중...</p>
        </div>
      </main>

      <nav class="tab-bar" id="tabBar"></nav>
    </div>
  </div>

  <!-- 설정 패널 (Settings) -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h3>설정</h3>
      <button class="btn-close" id="closeSettings">&times;</button>
    </div>
    <div class="settings-body" id="settingsBody"></div>
  </div>

  <!-- 인증 레이어 (Auth) -->
  <div id="authOverlay" style="display:none;"></div>

  <!-- 앱 설정 & 로직 -->
  <script type="module" src="core/app.js?v=8"></script>
</body>
</html>
